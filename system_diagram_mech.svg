<!-- DCFC HV bidir to battery — route right outside edge x=692, well clear of boxes -->
<path d="M682 746 L692 746 L692 504 L585 504" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5" marker-start="url(#arr-e)" marker-end="url(#arr-s)"/>
