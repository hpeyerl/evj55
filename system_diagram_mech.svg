<svg width="700" viewBox="0 0 700 1080" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
<title>FJ55 EV mechanical and electrical system diagram</title>
<desc>FJ55 EV conversion mechanical and electrical diagram.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-s" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-e" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M8 1L2 5L8 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="700" height="1080" fill="#ffffff"/>

<!-- LEGEND -->
<line x1="44" y1="44" x2="74" y2="44" stroke="#888780" stroke-width="2" opacity="0.8"/>
<text x="80" y="48" font-size="11" fill="#444441" dominant-baseline="central">Mechanical</text>
<line x1="44" y1="62" x2="74" y2="62" stroke="#BA7517" stroke-width="2" opacity="0.8" marker-start="url(#arr-e)" marker-end="url(#arr-s)"/>
<text x="80" y="66" font-size="11" fill="#444441" dominant-baseline="central">HV DC (bidirectional)</text>
<line x1="44" y1="80" x2="74" y2="80" stroke="#993C1D" stroke-width="2" opacity="0.8"/>
<text x="80" y="84" font-size="11" fill="#444441" dominant-baseline="central">3-phase AC</text>
<line x1="44" y1="98" x2="74" y2="98" stroke="#185FA5" stroke-width="2" opacity="0.8"/>
<text x="80" y="102" font-size="11" fill="#444441" dominant-baseline="central">12V DC</text>
<line x1="44" y1="116" x2="74" y2="116" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
<text x="80" y="120" font-size="11" fill="#444441" dominant-baseline="central">Control signal</text>
<line x1="44" y1="134" x2="74" y2="134" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
<text x="80" y="138" font-size="11" fill="#444441" dominant-baseline="central">AC mains</text>
<rect x="44" y="148" width="30" height="14" rx="3" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.7"/>
<text x="80" y="156" font-size="11" fill="#444441" dominant-baseline="central">Scope creep / future</text>

<!-- ══════════════════════════════════════════════
     STEERING CHAIN — left col, box x=42..152, centre x=97
     BRAKE CHAIN    — right col, box x=200..310, centre x=255
     Gap centre = x=176, used for 12V T-junction
     ══════════════════════════════════════════════ -->

<!-- STEERING CHAIN -->
<rect x="42" y="190" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="97" y="208" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Steering wheel</text>
<text x="97" y="223" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">FJ55 original</text>
<line x1="97" y1="234" x2="97" y2="258" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="42" y="258" width="110" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="97" y="276" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489" dominant-baseline="central">EPAS</text>
<text x="97" y="291" text-anchor="middle" font-size="10" fill="#534AB7" dominant-baseline="central">Prius donor</text>
<line x1="97" y1="302" x2="97" y2="326" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="42" y="326" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="97" y="344" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Steering box</text>
<text x="97" y="359" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">BJ60 donor</text>
<line x1="97" y1="370" x2="97" y2="530" stroke="#888780" stroke-width="1" stroke-dasharray="3 3" opacity="0.25"/>

<!-- BRAKE CHAIN — shifted right, centre x=255 -->
<rect x="200" y="190" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="255" y="208" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Brake pedal</text>
<text x="255" y="223" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">FJ55 original</text>
<line x1="255" y1="234" x2="255" y2="258" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="200" y="258" width="110" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="255" y="276" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489" dominant-baseline="central">iBooster</text>
<text x="255" y="291" text-anchor="middle" font-size="10" fill="#534AB7" dominant-baseline="central">Honda donor</text>
<line x1="255" y1="302" x2="255" y2="326" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="200" y="326" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="255" y="344" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Brake master</text>
<text x="255" y="359" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">HDJ80 donor</text>
<line x1="255" y1="370" x2="255" y2="530" stroke="#888780" stroke-width="1" stroke-dasharray="3 3" opacity="0.25"/>

<!-- 12V T-junction: trunk up centre x=176 from y=700 to y=158,
     horizontal bar at y=280 from EPAS right (x=152) to iBooster left (x=200),
     with arrowheads pointing into each box -->
<!-- vertical trunk -->
<line x1="340" y1="700" x2="340" y2="158" stroke="#185FA5" stroke-width="1.5" opacity="0.55"/>
<!-- top horizontal to centre of gap -->
<line x1="340" y1="158" x2="176" y2="158" stroke="#185FA5" stroke-width="1.5" opacity="0.55"/>
<!-- drop from x=176 down to y=280 -->
<line x1="176" y1="158" x2="176" y2="280" stroke="#185FA5" stroke-width="1.5" opacity="0.55"/>
<!-- T horizontal at y=280: left to EPAS right edge, right to iBooster left edge -->
<line x1="176" y1="280" x2="153" y2="280" stroke="#185FA5" stroke-width="1.5" opacity="0.75" marker-end="url(#arr)"/>
<line x1="176" y1="280" x2="199" y2="280" stroke="#185FA5" stroke-width="1.5" opacity="0.75" marker-end="url(#arr)"/>
<!-- junction dot -->
<circle cx="176" cy="280" r="3" fill="#185FA5" opacity="0.7"/>
<!-- label -->
<text x="344" y="430" font-size="10" fill="#185FA5" opacity="0.65">12V</text>

<!-- merge steering + brake into spine — spine centre x=191 (midpoint of 97 and 310 right edge = ~185, use 191) -->
<line x1="97" y1="530" x2="191" y2="530" stroke="#888780" stroke-width="2" opacity="0.6"/>
<line x1="255" y1="530" x2="191" y2="530" stroke="#888780" stroke-width="2" opacity="0.6"/>
<line x1="191" y1="530" x2="191" y2="550" stroke="#888780" stroke-width="2" opacity="0.6"/>

<!-- DRIVELINE SPINE centred at x=191 -->
<rect x="126" y="550" width="130" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="191" y="569" text-anchor="middle" font-size="12" font-weight="500" fill="#712B13" dominant-baseline="central">L110F transmission</text>
<text x="191" y="585" text-anchor="middle" font-size="10" fill="#993C1D" dominant-baseline="central">2× motors · LS600HL</text>
<line x1="191" y1="602" x2="191" y2="626" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="126" y="626" width="130" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="191" y="644" text-anchor="middle" font-size="12" font-weight="500" fill="#712B13" dominant-baseline="central">HF2A transfer case</text>
<text x="191" y="659" text-anchor="middle" font-size="10" fill="#993C1D" dominant-baseline="central">HDJ80 donor</text>
<line x1="191" y1="670" x2="191" y2="694" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="126" y="694" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="191" y="712" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">EPB caliper</text>
<text x="191" y="727" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">2020 RAV4 donor</text>
<line x1="191" y1="738" x2="191" y2="762" stroke="#888780" stroke-width="2" opacity="0.7"/>

<rect x="126" y="762" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="191" y="780" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Front + rear shafts</text>
<text x="191" y="795" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">4WD output</text>
<line x1="191" y1="806" x2="191" y2="830" stroke="#888780" stroke-width="2" opacity="0.7"/>

<!-- Magride shocks - scope creep -->
<rect x="126" y="830" width="130" height="44" rx="8" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="5 3"/>
<text x="191" y="848" text-anchor="middle" font-size="12" font-weight="500" fill="#854F0B" opacity="0.7" dominant-baseline="central">Magride shocks ×2</text>
<text x="191" y="863" text-anchor="middle" font-size="10" fill="#854F0B" opacity="0.6" dominant-baseline="central">Rear · Cadillac donor</text>
<line x1="126" y1="852" x2="86" y2="852" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" opacity="0.5" marker-end="url(#arr)"/>
<text x="72" y="870" text-anchor="middle" font-size="10" fill="#854F0B" opacity="0.55">air</text>
<rect x="44" y="876" width="56" height="34" rx="6" fill="none" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="72" y="894" text-anchor="middle" font-size="10" fill="#854F0B" opacity="0.55" dominant-baseline="central">Compressor</text>

<!-- HV ELECTRICAL right column x=505 -->
<rect x="430" y="190" width="150" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="505" y="209" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489" dominant-baseline="central">ZombieVerter VCU</text>
<text x="505" y="225" text-anchor="middle" font-size="10" fill="#534AB7" dominant-baseline="central">Motor controller</text>
<line x1="505" y1="242" x2="505" y2="292" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.75" marker-end="url(#arr)"/>
<text x="520" y="271" font-size="10" fill="#534AB7" opacity="0.8">sync serial / DIO</text>

<rect x="430" y="292" width="150" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="505" y="311" text-anchor="middle" font-size="12" font-weight="500" fill="#712B13" dominant-baseline="central">LS600HL inverter</text>
<text x="505" y="327" text-anchor="middle" font-size="10" fill="#993C1D" dominant-baseline="central">LS600HL donor</text>
<!-- 3-phase to transmission: route left to x=400, down to y=576, right to transmission right edge x=256 -->
<path d="M430 318 L400 318 L400 576 L256 576" fill="none" stroke="#993C1D" stroke-width="2" opacity="0.7" marker-end="url(#arr)"/>
<text x="403" y="312" font-size="10" fill="#993C1D" opacity="0.8">3φ AC</text>

<!-- HV bidir: inverter to contactor -->
<line x1="505" y1="344" x2="505" y2="394" stroke="#BA7517" stroke-width="2" opacity="0.75" marker-start="url(#arr-e)" marker-end="url(#arr-s)"/>

<rect x="430" y="394" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="505" y="412" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" dominant-baseline="central">Contactor / precharge</text>
<text x="505" y="427" text-anchor="middle" font-size="10" fill="#5F5E5A" dominant-baseline="central">Separate assembly</text>

<!-- HV bidir: contactor to battery -->
<line x1="505" y1="438" x2="505" y2="488" stroke="#BA7517" stroke-width="2" opacity="0.75" marker-start="url(#arr-e)" marker-end="url(#arr-s)"/>

<rect x="425" y="488" width="160" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="505" y="507" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" dominant-baseline="central">BMW i3 battery pack</text>
<text x="505" y="523" text-anchor="middle" font-size="10" fill="#854F0B" dominant-baseline="central">42 kWh · with BMS</text>

<!-- HV bidir: battery to OBC -->
<line x1="505" y1="540" x2="505" y2="588" stroke="#BA7517" stroke-width="2" opacity="0.75" marker-start="url(#arr-e)" marker-end="url(#arr-s)"/>

<rect x="425" y="588" width="160" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="505" y="607" text-anchor="middle" font-size="12" font-weight="500" fill="#633806" dominant-baseline="central">Outlander OBC/DC-DC</text>
<text x="505" y="623" text-anchor="middle" font-size="10" fill="#854F0B" dominant-baseline="central">AC charge + 12V out</text>

<!-- 12V down to battery -->
<line x1="470" y1="640" x2="470" y2="688" stroke="#185FA5" stroke-width="1.5" opacity="0.75" marker-end="url(#arr)"/>
<text x="446" y="668" font-size="10" fill="#185FA5" opacity="0.8">12V</text>

<rect x="425" y="688" width="160" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="505" y="706" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C" dominant-baseline="central">12V battery</text>
<text x="505" y="721" text-anchor="middle" font-size="10" fill="#185FA5" dominant-baseline="central">Lead-acid aux</text>

<!-- 12V trunk from battery left to x=340, used by T-junction above -->
<line x1="425" y1="700" x2="340" y2="700" stroke="#185FA5" stroke-width="1.5" opacity="0.55"/>

<!-- CHARGE PORTS far right -->
<rect x="600" y="588" width="82" height="52" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="641" y="607" text-anchor="middle" font-size="12" font-weight="500" fill="#27500A" dominant-baseline="central">J1772</text>
<text x="641" y="623" text-anchor="middle" font-size="10" fill="#3B6D11" dominant-baseline="central">AC Level 1/2</text>
<line x1="600" y1="614" x2="585" y2="614" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.75" marker-end="url(#arr)"/>

