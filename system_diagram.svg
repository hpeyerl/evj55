<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- CAN Bus backbone -->
<rect x="40" y="338" width="600" height="8" rx="4" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
<text font-size="12" fill="#888" x="340" y="330" text-anchor="middle">CAN bus 500 kbps</text>

<!-- M5Dial -->
<rect x="40" y="40" width="140" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="110" y="65" text-anchor="middle">M5Dial</text>
<text font-size="12" fill="#534AB7" x="110" y="83" text-anchor="middle">Steering wheel</text>
<text font-size="11" fill="#888" x="110" y="114" text-anchor="middle">clockspring</text>
<line x1="110" y1="96" x2="110" y2="130" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2"/>

<!-- IS3050G -->
<rect x="55" y="130" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="110" y="150" text-anchor="middle">IS3050G</text>
<text font-size="12" fill="#5F5E5A" x="110" y="166" text-anchor="middle">column fixed</text>
<line x1="110" y1="174" x2="110" y2="338" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Zombieverter -->
<rect x="270" y="40" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="340" y="65" text-anchor="middle">Zombieverter</text>
<text font-size="12" fill="#0F6E56" x="340" y="83" text-anchor="middle">motor controller</text>
<line x1="340" y1="96" x2="340" y2="338" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- BMS -->
<rect x="500" y="40" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="570" y="65" text-anchor="middle">BMS</text>
<text font-size="12" fill="#0F6E56" x="570" y="83" text-anchor="middle">Lilygo T-CAN485</text>
<line x1="570" y1="96" x2="570" y2="338" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Dashboard -->
<rect x="220" y="390" width="240" height="76" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="340" y="416" text-anchor="middle">Dashboard</text>
<text font-size="12" fill="#185FA5" x="340" y="434" text-anchor="middle">ESP32-P4-NANO</text>
<text font-size="12" fill="#185FA5" x="340" y="452" text-anchor="middle">Waveshare 10.1" DSI</text>
<line x1="340" y1="346" x2="340" y2="390" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Headlight pot -->
<rect x="40" y="430" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="100" y="450" text-anchor="middle">Headlight pot</text>
<text font-size="11" fill="#5F5E5A" x="100" y="466" text-anchor="middle">ADC → dimming</text>
<line x1="160" y1="452" x2="220" y2="452" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- VSS -->
<rect x="40" y="510" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="100" y="530" text-anchor="middle">VSS sensor</text>
<text font-size="11" fill="#5F5E5A" x="100" y="546" text-anchor="middle">PCNT edge count</text>
<line x1="160" y1="532" x2="220" y2="475" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- EPB -->
<rect x="40" y="590" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="100" y="610" text-anchor="middle">EPB controller</text>
<text font-size="11" fill="#5F5E5A" x="100" y="626" text-anchor="middle">GPIO LED+button</text>
<line x1="160" y1="612" x2="220" y2="490" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Camera future -->
<rect x="500" y="430" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#2C2C2A" x="570" y="450" text-anchor="middle">Reverse camera</text>
<text font-size="11" fill="#888" x="570" y="466" text-anchor="middle">future / TBD</text>
<line x1="500" y1="452" x2="460" y2="452" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)" opacity="0.4"/>

<!-- NAT Router -->
<rect x="500" y="510" width="140" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#633806" x="570" y="530" text-anchor="middle">NAT router</text>
<text font-size="11" fill="#854F0B" x="570" y="546" text-anchor="middle">ESP32 dedicated</text>
<line x1="460" y1="428" x2="502" y2="512" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)" opacity="0.4"/>
<text font-size="11" fill="#888" x="493" y="476" text-anchor="middle">WiFi</text>

<!-- Home WiFi -->
<rect x="500" y="590" width="140" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="13" font-weight="500" fill="#633806" x="570" y="610" text-anchor="middle">Home WiFi</text>
<text font-size="11" fill="#854F0B" x="570" y="626" text-anchor="middle">debug access</text>
<line x1="570" y1="554" x2="570" y2="590" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Legend -->
<text font-size="11" fill="#888" x="40" y="675">Legend:</text>
<line x1="90" y1="671" x2="115" y2="671" stroke="#888" stroke-width="1.5" stroke-dasharray="6 3"/>
<text font-size="11" fill="#888" x="120" y="675">CAN bus</text>
<line x1="175" y1="671" x2="200" y2="671" stroke="#888" stroke-width="0.5"/>
<text font-size="11" fill="#888" x="205" y="675">GPIO/analog</text>
<line x1="270" y1="671" x2="295" y2="671" stroke="#888" stroke-width="0.5" stroke-dasharray="3 2"/>
<text font-size="11" fill="#888" x="300" y="675">WiFi / future</text>
</svg>
